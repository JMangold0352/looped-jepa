# I-JEPA ViT-Tiny CIFAR-10 + VICReg variance/covariance regularizer.
# Inherits the baseline recipe and only overrides the regularizer and output dirs,
# so it is a clean A/B against baseline-v0 (configs/image_jepa_cifar10.yaml).
_base_: image_jepa_cifar10.yaml

# NOTE (v1 -> v2): the first attempt (var 1.0 / cov 0.04) regressed the probe
# (51.6% vs 59.5% baseline) because the regularizer dominated JEPA's small
# latent prediction loss (~0.07). Scaled coefficients ~10x down + reg warmup so
# prediction leads and VICReg acts as a gentle anti-collapse regularizer.
regularizer:
  enabled: true
  type: vicreg
  var_coeff: 0.1
  cov_coeff: 0.002
  warmup_steps: 1000
  projector: [1024, 1024]

train:
  run_dir: runs/cifar10_vicreg_v2
  checkpoint_dir: checkpoints/vicreg_v2
